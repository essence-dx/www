<!doctype html><html lang=en><meta charset=utf-8><meta name=viewport content=width=device-width,initial-scale=1><title>WWW Counter</title><main aria-label="Fair counter"><h1>Fair Counter</h1><output id=c aria-live=polite>0</output><p><button data-x=1>+</button><button data-x=-1>-</button><button data-x=r>0</button></p></main><script>let n=0,c=document.getElementById("c");addEventListener("click",e=>{let x=e.target.dataset.x;if(x)c.textContent=n=x=="r"?0:n+ +x})</script>
